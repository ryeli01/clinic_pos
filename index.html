<!DOCTYPE html>
<html>
<head>
    <title>Clinic POS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, Helvetica; padding: 20px; max-width: 600px; margin: auto; }
        .med_btn { padding: 10px; margin: 5px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 4px; }
        .cart_item { margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; background-color: #f9f9f9; padding: 5px; border-radius: 4px;}
        .qty_input { width: 50px; padding: 5px; text-align: center; }
        
        .fee_section { margin-top: 15px; padding: 15px; background-color: #eef2f5; border-radius: 5px; }
        .fee_row { margin-bottom: 10px; display: flex; align-items: center; }
        .fee_row label { margin-left: 5px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
        
        .total, .change { font-size: 1.2em; font-weight: bold; margin-top: 15px; }
        .checkout_section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #ccc; }
        .input_amount { padding: 8px; width: 100px; font-size: 1em; margin-left: auto; }
        .patient_input { width: 100%; padding: 10px; font-size: 1.1em; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;}
        .remove_btn { background-color: #f44336; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-weight: bold; }
        
        /* Edit Button Style */
        .edit_btn { background-color: #FFC107; color: black; border: none; padding: 3px 8px; cursor: pointer; border-radius: 3px; font-weight: bold; margin-left: 10px; font-size: 0.8em; }

        .save_btn { margin-top: 20px; width: 100%; padding: 15px; background-color: #2196F3; color: white; border: none; cursor: pointer; border-radius: 4px; font-size: 1.2em; font-weight: bold; }
        .save_btn:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        .sync_btn { background-color: #FF9800; display: none; margin-top: 10px; }

        /* RECEIPT MODAL STYLES */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 10; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.6); 
        }
        .modal-content {
            background-color: #fff;
            margin: 5% auto; 
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .receipt-header { text-align: center; font-size: 1.3em; font-weight: bold; margin-bottom: 15px; color: #4CAF50; }
        .receipt-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95em; }
        .receipt-divider { border-top: 1px dashed #ccc; margin: 10px 0; }
        .receipt-bold { font-weight: bold; }
        .receipt-subtext { font-size: 0.85em; color: #555; }
        
        #receipt_body {
            max-height: 50vh; 
            overflow-y: auto; 
            padding-right: 5px; 
        }
        
        .button-group {
            display: flex; gap: 10px; margin-top: 20px;
        }
        .print-btn, .reset-btn {
            flex: 1; padding: 12px; color: white; border: none;
            border-radius: 4px; font-size: 1.1em; font-weight: bold; cursor: pointer;
        }
        .print-btn { background-color: #607D8B; }
        .reset-btn { background-color: #f44336; }

        /* PRINT SETTINGS */
        @media print {
            @page {
                margin: 10mm; 
            }
            body {
                background: white;
                margin: 0;
                padding: 0;
            }
            .main-app-container {
                display: none !important;
            }
            .modal {
                position: static !important;
                background: none !important;
                display: flex !important;
                justify-content: center !important;
                align-items: flex-start !important;
                padding-top: 0 !important;
            }
            .modal-content {
                width: 100% !important;
                max-width: 350px !important;
                margin: 0 auto !important;
                border: 2px solid #000 !important;
                box-shadow: none !important;
                page-break-inside: avoid !important;
            }
            #receipt_body {
                max-height: none !important;
                overflow: visible !important;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="main-app-container">
        <h2>Clinic Cashier</h2>
        
        <input type="text" id="patient_name" class="patient_input" placeholder="Enter Patient Full Name">
        
        <div id="medicine_list">
        </div>

        <h3>Cart</h3>
        <div id="cart"></div>

        <div class="fee_section">
            <div class="fee_row">
                <input type="checkbox" id="has_pf" onchange="togglePF()">
                <label for="has_pf">Professional Fee</label>
                <input type="number" id="pf_amount" class="input_amount hidden" min="0" step="0.01" placeholder="₱ Amount" oninput="updateCart()">
            </div>
            <div class="fee_row">
                <input type="checkbox" id="has_medcert" onchange="toggleMedCert()">
                <label for="has_medcert">Medical Certificate</label>
                <input type="number" id="medcert_amount" class="input_amount hidden" min="0" step="0.01" placeholder="₱ Amount" oninput="updateCart()">
            </div>
        </div>

        <div class="total" id="total_display">Total: ₱0.00</div>
        
        <div class="checkout_section">
            <label for="amount_tendered"><strong>Amount Tendered (₱): </strong></label>
            <input type="number" id="amount_tendered" class="input_amount" min="0" step="0.01" placeholder="Enter amount" oninput="calculateChange()">
            
            <div class="change" id="change_display">Change: ₱0.00</div>
            
            <button id="save_button" class="save_btn" onclick="saveData()">Save Record</button>
            <button id="sync_button" class="save_btn sync_btn" onclick="syncOfflineRecords()">Sync Offline Records</button>
        </div>
    </div>

    <div id="receiptModal" class="modal">
        <div class="modal-content">
            <div class="receipt-header">Record Saved!</div>
            <div id="receipt_body">
                </div>
            
            <div class="button-group no-print">
                <button class="print-btn" onclick="window.print()">Print Receipt</button>
                <button class="reset-btn" onclick="closeReceiptAndReset()">Close & Reset</button>
            </div>
        </div>
    </div>

    <script>
        const medicines = [
            { name: "Abdin 10 mg", price: 80 },
    { name: "Abdin 5 mg", price: 60 },
    { name: "Abilify", price: 250 },
    { name: "Akidin", price: 15 },
    { name: "Apiden", price: 12 },
    { name: "Arilan Aripiprazole 5 mg", price: 40 },
    { name: "Arilan Aripiprazole 10 mg", price: 55 },
    { name: "Asterol", price: 15 },
    { name: "Brintellix 10 mg", price: 115 },
    { name: "Brintellix 5 mg", price: 90 },
    { name: "Concerta", price: 230 },
    { name: "Conjupram", price: 17 },
    { name: "Depamax 250 mg", price: 17 },
    { name: "Depamax 500 mg", price: 22 },
    { name: "Depamax Syrup", price: 275 },
    { name: "Diphenhydramine 25 mg", price: 5 },
    { name: "Diphenhydramine 50 mg", price: 5 },
    { name: "Drafzin", price: 21 },
    { name: "Escinal", price: 15 },
    { name: "Fluphenazine", price: 900 },
    { name: "Folic", price: 5 },
    { name: "Haloperidol", price: 25 },
    { name: "Lamotrigine", price: 25 },
    { name: "Lexapro", price: 100 },
    { name: "Loxx 30 mg", price: 20 },
    { name: "Loxx 60 mg", price: 30 },
    { name: "Maintena", price: 10500 },
    { name: "Mirazep/Menelat", price: 45 },
    { name: "Morcet", price: 17 },
    { name: "Motrigine", price: 30 },
    { name: "Neurotain", price: 40 },
    { name: "Olanzapine (Olanzin, Zenia)", price: 50 },
    { name: "Q-win", price: 50 },
    { name: "Quetadin", price: 40 },
    { name: "Rexulti 1 mg", price: 160 },
    { name: "Rexulti 2 mg", price: 200 },
    { name: "Rexulti 4 mg", price: 200 },
    { name: "Ricoverin", price: 20 },
    { name: "Riscare", price: 50 },
    { name: "Rispen / Reone", price: 15 },
    { name: "Ritalin", price: 75 },
    { name: "Rivotril", price: 50 },
    { name: "Syclop /Ziproc (Clozapine)", price: 35 },
    { name: "Telmisartan", price: 15 },
    { name: "Valparin", price: 30 },
    { name: "Valparin Syrup", price: 250 },
    { name: "Vit B (Multivitamins)", price: 5 },
    { name: "Vit C", price: 5 },
    { name: "Voxamine", price: 55 },
    { name: "Xanor", price: 50 },
    { name: "Deperin (Zotral/ Sertraline)", price: 25 },
    { name: "Zuredel", price: 20 }
        ];

        let cart = [];

        function init() {
            const list = document.getElementById("medicine_list");
            medicines.forEach((med, index) => {
                let btn = document.createElement("button");
                btn.className = "med_btn";
                btn.innerText = med.name + " (₱" + med.price.toFixed(2) + ")";
                btn.onclick = () => addToCart(index);
                list.appendChild(btn);
            });
            checkOfflineQueue(); 
        }

        function addToCart(index) {
            const med = medicines[index];
            const existingItem = cart.find(item => item.name === med.name);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...med, quantity: 1 });
            }
            updateCart();
        }

        function updateQuantity(index, newQuantity) {
            if (newQuantity <= 0) {
                cart.splice(index, 1);
            } else {
                cart[index].quantity = parseInt(newQuantity);
            }
            updateCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        // Edit unit price in the cart using base64 obscured password
        function editPrice(index) {
            let password = prompt("Enter authorization password to edit price:");
            
            if (password === null) {
                return; // User clicked cancel
            }
            
           
            if (btoa(password) !== "bjFtYlVz") {
                alert("Incorrect password. Price edit denied.");
                return;
            }
            
            let currentPrice = cart[index].price;
            let newPriceStr = prompt("Enter new unit price for " + cart[index].name + ":", currentPrice);
            
            if (newPriceStr !== null) {
                let newPrice = parseFloat(newPriceStr);
                if (!isNaN(newPrice) && newPrice >= 0) {
                    cart[index].price = newPrice;
                    updateCart();
                } else {
                    alert("Invalid price entered. Please enter a valid number.");
                }
            }
        }

        function togglePF() {
            const pfInput = document.getElementById("pf_amount");
            if (document.getElementById("has_pf").checked) {
                pfInput.classList.remove("hidden");
            } else {
                pfInput.classList.add("hidden");
                pfInput.value = "";
            }
            updateCart();
        }

        function toggleMedCert() {
            const mcInput = document.getElementById("medcert_amount");
            if (document.getElementById("has_medcert").checked) {
                mcInput.classList.remove("hidden");
            } else {
                mcInput.classList.add("hidden");
                mcInput.value = "";
            }
            updateCart();
        }

        function getGrandTotal() {
            let cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            let pf = parseFloat(document.getElementById("pf_amount").value) || 0;
            let medcert = parseFloat(document.getElementById("medcert_amount").value) || 0;
            return cartTotal + pf + medcert;
        }

        function updateCart() {
            const cartDiv = document.getElementById("cart");
            cartDiv.innerHTML = "";
            
            cart.forEach((item, index) => {
                let div = document.createElement("div");
                div.className = "cart_item";
                
                // Container for Name and Edit Button
                let nameContainer = document.createElement("div");
                nameContainer.style.display = "flex";
                nameContainer.style.alignItems = "center";
                
                let nameSpan = document.createElement("span");
                nameSpan.innerText = item.name + " (₱" + item.price.toFixed(2) + ")";
                
                let editBtn = document.createElement("button");
                editBtn.className = "edit_btn";
                editBtn.innerText = "Edit";
                editBtn.onclick = () => editPrice(index);
                
                nameContainer.appendChild(nameSpan);
                nameContainer.appendChild(editBtn);
                
                // Container for Quantity and Remove Button
                let controlsDiv = document.createElement("div");
                
                let qtyInput = document.createElement("input");
                qtyInput.type = "number";
                qtyInput.className = "qty_input";
                qtyInput.value = item.quantity;
                qtyInput.min = "1";
                qtyInput.onchange = (e) => updateQuantity(index, e.target.value);
                
                let removeBtn = document.createElement("button");
                removeBtn.className = "remove_btn";
                removeBtn.innerText = "X";
                removeBtn.style.marginLeft = "10px";
                removeBtn.onclick = () => removeFromCart(index);
                
                controlsDiv.appendChild(qtyInput);
                controlsDiv.appendChild(removeBtn);
                
                div.appendChild(nameContainer);
                div.appendChild(controlsDiv);
                
                cartDiv.appendChild(div);
            });

            let finalTotal = getGrandTotal();
            document.getElementById("total_display").innerText = "Total: ₱" + finalTotal.toFixed(2);
            
            calculateChange(); 
        }

        function calculateChange() {
            let finalTotal = getGrandTotal();
            let tenderedStr = document.getElementById("amount_tendered").value;
            let tendered = parseFloat(tenderedStr);
            let changeDisplay = document.getElementById("change_display");
            
            if (isNaN(tendered) || tenderedStr.trim() === "") {
                changeDisplay.innerText = "Change: ₱0.00";
                changeDisplay.style.color = "black";
                return 0;
            }
            
            let change = tendered - finalTotal;
            
            if (change < 0) {
                changeDisplay.innerText = "Change: Insufficient Amount";
                changeDisplay.style.color = "red";
            } else {
                changeDisplay.innerText = "Change: ₱" + change.toFixed(2);
                changeDisplay.style.color = "green";
            }
            return change;
        }

        function clearForm() {
            cart = [];
            document.getElementById("patient_name").value = "";
            document.getElementById("amount_tendered").value = "";
            document.getElementById("has_pf").checked = false;
            document.getElementById("has_medcert").checked = false;
            
            togglePF();
            toggleMedCert();
            updateCart();
        }

        function generateReceipt(patientName, total, tendered, change, pfAmount, medCertAmount) {
            const receiptBody = document.getElementById("receipt_body");
            let html = `<div class="receipt-line receipt-bold"><span>Patient:</span> <span>${patientName}</span></div>`;
            html += `<div class="receipt-divider"></div>`;
            
            if (cart.length > 0) {
                html += `<div class="receipt-bold" style="margin-bottom: 5px;">Medicines:</div>`;
                cart.forEach(item => {
                    let subtotal = item.price * item.quantity;
                    html += `
                    <div class="receipt-line">
                        <span class="receipt-subtext">${item.name} <br>(₱${item.price.toFixed(2)} x ${item.quantity})</span>
                        <span>₱${subtotal.toFixed(2)}</span>
                    </div>`;
                });
                html += `<div class="receipt-divider"></div>`;
            }

            if (pfAmount > 0 || medCertAmount > 0) {
                html += `<div class="receipt-bold" style="margin-bottom: 5px;">Fees:</div>`;
                if (pfAmount > 0) {
                    html += `<div class="receipt-line"><span>Professional Fee</span> <span>₱${pfAmount.toFixed(2)}</span></div>`;
                }
                if (medCertAmount > 0) {
                    html += `<div class="receipt-line"><span>Medical Certificate</span> <span>₱${medCertAmount.toFixed(2)}</span></div>`;
                }
                html += `<div class="receipt-divider"></div>`;
            }

            html += `<div class="receipt-line receipt-bold"><span>Total Payable:</span> <span>₱${total.toFixed(2)}</span></div>`;
            html += `<div class="receipt-line"><span>Amount Tendered:</span> <span>₱${tendered.toFixed(2)}</span></div>`;
            html += `<div class="receipt-line receipt-bold" style="color: green;"><span>Change:</span> <span>₱${change.toFixed(2)}</span></div>`;

            receiptBody.innerHTML = html;
            
            document.getElementById("receiptModal").style.display = "block";
        }

        function closeReceiptAndReset() {
            document.getElementById("receiptModal").style.display = "none";
            clearForm(); 
        }

        function checkOfflineQueue() {
            let offlineRecords = JSON.parse(localStorage.getItem("clinic_offline_records")) || [];
            const syncBtn = document.getElementById("sync_button");
            
            if (offlineRecords.length > 0) {
                syncBtn.style.display = "block";
                syncBtn.innerText = `Sync Offline Records (${offlineRecords.length})`;
            } else {
                syncBtn.style.display = "none";
            }
        }

        function saveToOfflineQueue(payload) {
            let offlineRecords = JSON.parse(localStorage.getItem("clinic_offline_records")) || [];
            offlineRecords.push(payload);
            localStorage.setItem("clinic_offline_records", JSON.stringify(offlineRecords));
            checkOfflineQueue();
        }

        function syncOfflineRecords() {
            let offlineRecords = JSON.parse(localStorage.getItem("clinic_offline_records")) || [];
            if (offlineRecords.length === 0) return;

            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwZDNH1atKxA7vBP6YZgdtycSkQ1Qu4qmWfwwn--4ATcWiCrVng54fqV9X5GtchTw93/exec"; 
            const syncBtn = document.getElementById("sync_button");
            
            syncBtn.innerText = "Syncing...";
            syncBtn.disabled = true;

            let payload = offlineRecords[0];

            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(payload),
                headers: {
                    "Content-Type": "text/plain;charset=utf-8",
                }
            })
            .then(response => response.json())
            .then(data => {
                offlineRecords.shift(); 
                localStorage.setItem("clinic_offline_records", JSON.stringify(offlineRecords));
                
                checkOfflineQueue();
                
                if (offlineRecords.length > 0) {
                    syncOfflineRecords();
                } else {
                    syncBtn.disabled = false;
                    alert("All offline records have been synced to Google Sheets!");
                }
            })
            .catch(error => {
                console.error("Still offline", error);
                syncBtn.disabled = false;
                checkOfflineQueue();
                alert("You are still offline. Try syncing again later when your connection is stable.");
            });
        }

        function saveData() {
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwZDNH1atKxA7vBP6YZgdtycSkQ1Qu4qmWfwwn--4ATcWiCrVng54fqV9X5GtchTw93/exec"; 
            
            const patientName = document.getElementById("patient_name").value.trim();
            const total = getGrandTotal();
            const tendered = parseFloat(document.getElementById("amount_tendered").value);
            const change = calculateChange();
            const pfAmount = parseFloat(document.getElementById("pf_amount").value) || 0;
            const medCertAmount = parseFloat(document.getElementById("medcert_amount").value) || 0;

            if (patientName === "") {
                alert("Please enter the patient's name.");
                return;
            }
            if (cart.length === 0 && pfAmount === 0 && medCertAmount === 0) {
                alert("Cart is empty and no fees are added.");
                return;
            }
            if (isNaN(tendered) || change < 0) {
                alert("Please enter a valid and sufficient amount tendered.");
                return;
            }

            let medsListString = cart.length > 0 
                ? cart.map(item => `${item.name} (₱${item.price.toFixed(2)} x ${item.quantity})`).join(", ") 
                : "None";

            const payload = {
                patientName: patientName,
                medicines: medsListString,
                pf: pfAmount,
                medCert: medCertAmount,
                total: total,
                tendered: tendered,
                change: change
            };

            const saveBtn = document.getElementById("save_button");
            saveBtn.innerText = "Saving to Database...";
            saveBtn.disabled = true;

            generateReceipt(patientName, total, tendered, change, pfAmount, medCertAmount);

            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(payload),
                headers: {
                    "Content-Type": "text/plain;charset=utf-8",
                }
            })
            .then(response => response.json())
            .then(data => {
                saveBtn.innerText = "Save Record";
                saveBtn.disabled = false;
            })
            .catch(error => {
                console.error("Offline Mode Triggered", error);
                saveBtn.innerText = "Save Record";
                saveBtn.disabled = false;
                
                saveToOfflineQueue(payload);
                
                document.querySelector('.receipt-header').innerText = "Saved Locally (Offline Mode)";
                document.querySelector('.receipt-header').style.color = "#FF9800";
            });
        }

        init();
    </script>
</body>
</html>
